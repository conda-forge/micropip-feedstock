{% set name = "micropip" %}
{% set version = "0.8.0" %}
{% set python_min = "3.12" %}

package:
  name: micropip
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/m/micropip/micropip-{{ version }}.tar.gz
  sha256: 2ed086a2aa946434470a2831718360652b1acf3b85bca8be29fb048dd6169965

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - setuptools-scm >=6.2
    - wheel
    - pip
  run:
    - python >={{ python_min }},<4.0
    - packaging >=23.0

test:
  imports:
    - micropip
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pyodide/micropip
  summary: A lightweight Python package installer for the web
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jtpio
    - rxm7706
    - yuvipanda
